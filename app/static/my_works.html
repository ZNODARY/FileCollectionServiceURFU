<!DOCTYPE html>
<html>
<head>
    <title>Мои работы</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .work-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .create-btn { background: green; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .back-btn { background: gray; color: white; padding: 10px 20px; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 100px auto; padding: 20px; width: 400px; border-radius: 10px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; }
    </style>
</head>
<body>
    <h2>Мои работы</h2>
    
    <button id="uploadWorkBtn" class="create-btn">+ Загрузить работу</button>
    <a href="/dashboard.html" class="back-btn">← Назад</a>
    
    <h3>Список работ</h3>
    <div id="worksList"></div>
    
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Загрузить работу</h3>
            <form id="uploadWorkForm">
                <select id="eventSelect" required>
                    <option value="">Выберите мероприятие</option>
                </select>
                <input type="text" id="title" placeholder="Название работы" required>
                <input type="url" id="link" required>
                <button type="submit">Загрузить</button>
            </form>
        </div>
    </div>

    <script>
        async function loadEventsForSelect() {
            const res = await fetch('/api/events/my');
            const events = await res.json();
            const select = document.getElementById('eventSelect');
            select.innerHTML = '<option value="">Выберите мероприятие</option>';
            events.forEach(e => {
                select.innerHTML += `<option value="${e.id}">${e.title}</option>`;
            });
        }
        
        async function loadWorks() {
            const res = await fetch('/api/works/my');
            const works = await res.json();
            const container = document.getElementById('worksList');
            if (works.length === 0) {
                container.innerHTML = '<p>Нет загруженных работ</p>';
                return;
            }
            container.innerHTML = works.map(w => `
                <div class="work-card">
                    <strong>${w.title}</strong><br>
                    <a href="${w.link}" target="_blank">Открыть</a><br>
                    Статус: ${w.status}<br>
                    <small>Загружено: ${new Date(w.created_at).toLocaleDateString()}</small>
                </div>
            `).join('');
        }
        
        const modal = document.getElementById('uploadModal');
        const uploadBtn = document.getElementById('uploadWorkBtn');
        const closeBtn = document.querySelector('.close');
        
        uploadBtn.onclick = () => {
            loadEventsForSelect();
            modal.style.display = 'block';
        };
        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
        
        document.getElementById('uploadWorkForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const res = await fetch('/api/works/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    event_id: parseInt(document.getElementById('eventSelect').value),
                    title: document.getElementById('title').value,
                    link: document.getElementById('link').value
                })
            });
            
            if (res.ok) {
                modal.style.display = 'none';
                document.getElementById('uploadWorkForm').reset();
                loadWorks();
            } else {
                const err = await res.json();
                alert('Ошибка: ' + (err.detail || 'Неизвестная ошибка'));
            }
        };
        
        loadWorks();
    </script>
</body>
</html>
